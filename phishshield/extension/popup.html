<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      width: 300px;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1e1e2d, #2d2b42);
      color: #ffffff;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .container {
      padding: 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .logo-container {
      margin-bottom: 15px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #4facfe;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    p#status {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      padding-top: 10px;
    }

    p#details {
      font-size: 13px;
      color: #b0bac9;
      margin-top: 8px;
    }

    /* Status Colors */
    .safe { color: #2ecc71 !important; transform: scale(1.05); }
    .medium { color: #f39c12 !important; transform: scale(1.05); }
    .high { color: #e74c3c !important; transform: scale(1.05); }

    .icon-result {
      font-size: 40px;
      margin-bottom: 10px;
      display: none;
    }

    .safe-bg { background: linear-gradient(135deg, #142e22, #1b4d32); }
    .medium-bg { background: linear-gradient(135deg, #3d2a13, #573a11); }
    .high-bg { background: linear-gradient(135deg, #3e1616, #591616); }

  </style>
</head>
<body>

<div class="container">
  <div class="logo-container">
    <h3 class="logo-text">PhishShield</h3>
  </div>

  <div class="status-card" id="statusCard">
    <div class="spinner" id="loadingSpinner"></div>
    <div class="icon-result" id="resultIcon"></div>
    <p id="status">Analyzing current page...</p>
    <p id="details"></p>
  </div>
</div>

<script src="popup.js"></script>

</body>
</html>
